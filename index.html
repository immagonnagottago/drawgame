<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sketchworld</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      font-size: 11px;
      color: #333;
      line-height: 1.9;
      z-index: 10;
      pointer-events: none;
    }
    #game-canvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
    }
    #draw-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    #draw-overlay.active { display: flex; }
    #draw-prompt { font-size: 12px; color: #555; letter-spacing: 0.18em; text-transform: uppercase; }
    #draw-name   { font-size: 30px; color: #fff; letter-spacing: 0.04em; }
    #draw-canvas { border: 1px solid #1a1a1a; cursor: crosshair; touch-action: none; background: #000; }
    #draw-controls { display: flex; gap: 12px; }
    .btn {
      background: none;
      border: 1px solid #2a2a2a;
      color: #666;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      padding: 8px 22px;
      cursor: pointer;
      text-transform: uppercase;
      transition: border-color 0.12s, color 0.12s;
    }
    .btn:hover { border-color: #888; color: #ccc; }
    .btn.primary { border-color: #fff; color: #fff; }
    .btn.primary:hover { background: #fff; color: #000; }
    #draw-hint { font-size: 10px; color: #222; letter-spacing: 0.1em; }
  </style>
</head>
<body>

<div id="ui">
  WASD / ARROWS — move<br>
  step on ? to discover
</div>

<canvas id="game-canvas"></canvas>

<div id="draw-overlay">
  <div id="draw-prompt">you've never seen one before. draw it.</div>
  <div id="draw-name"></div>
  <canvas id="draw-canvas" width="400" height="400"></canvas>
  <div id="draw-controls">
    <button class="btn" id="btn-undo">undo</button>
    <button class="btn" id="btn-clear">clear</button>
    <button class="btn primary" id="btn-done">done</button>
  </div>
  <div id="draw-hint">white lines · black background</div>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
const TILE  = 80;
const COLS  = 40;
const ROWS  = 30;

const THINGS = [
  'rat', 'goblin', 'chest', 'mushroom', 'well',
  'scarecrow', 'stone', 'campfire', 'gate', 'rune'
];

// ── GAME CANVAS ──────────────────────────────────────────────────────────────
const gc  = document.getElementById('game-canvas');
const ctx = gc.getContext('2d');
gc.width  = window.innerWidth;
gc.height = window.innerHeight;
window.addEventListener('resize', () => {
  gc.width  = window.innerWidth;
  gc.height = window.innerHeight;
});

// ── WORLD STATE ──────────────────────────────────────────────────────────────
const drawings = {};   // name → offscreen HTMLCanvasElement
const world    = [];
let player     = { x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) };
let pending    = null;
let keys       = {};

for (let r = 0; r < ROWS; r++) {
  world[r] = [];
  for (let c = 0; c < COLS; c++) world[r][c] = { thing: null, discovered: false };
}

// Scatter entities
(function() {
  const pool = [...THINGS, ...THINGS, ...THINGS, ...THINGS];
  for (let i = 0; i < 60; i++) {
    const r = 1 + Math.floor(Math.random() * (ROWS - 2));
    const c = 1 + Math.floor(Math.random() * (COLS - 2));
    if (Math.abs(r - player.y) < 3 && Math.abs(c - player.x) < 3) continue;
    world[r][c].thing = pool[Math.floor(Math.random() * pool.length)];
  }
})();

// ── DRAW OVERLAY ─────────────────────────────────────────────────────────────
const dc      = document.getElementById('draw-canvas');
const dctx    = dc.getContext('2d');
const overlay = document.getElementById('draw-overlay');
let strokes   = [];
let curStroke = null;
let isDrawing = false;

function clearDraw() {
  dctx.fillStyle = '#000';
  dctx.fillRect(0, 0, dc.width, dc.height);
}

function redrawStrokes() {
  clearDraw();
  dctx.strokeStyle = '#fff';
  dctx.lineWidth   = 2;
  dctx.lineCap     = 'round';
  dctx.lineJoin    = 'round';
  for (const s of strokes) {
    if (s.length < 2) continue;
    dctx.beginPath();
    dctx.moveTo(s[0].x, s[0].y);
    for (let i = 1; i < s.length; i++) dctx.lineTo(s[i].x, s[i].y);
    dctx.stroke();
  }
}

function getPos(e) {
  const rect = dc.getBoundingClientRect();
  const src  = e.touches ? e.touches[0] : e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}

dc.addEventListener('pointerdown', e => {
  isDrawing = true;
  curStroke = [getPos(e)];
  dc.setPointerCapture(e.pointerId);
});
dc.addEventListener('pointermove', e => {
  if (!isDrawing) return;
  curStroke.push(getPos(e));
  redrawStrokes();
  dctx.strokeStyle = '#fff';
  dctx.lineWidth   = 2;
  dctx.lineCap     = 'round';
  dctx.lineJoin    = 'round';
  dctx.beginPath();
  dctx.moveTo(curStroke[0].x, curStroke[0].y);
  for (let i = 1; i < curStroke.length; i++) dctx.lineTo(curStroke[i].x, curStroke[i].y);
  dctx.stroke();
});
dc.addEventListener('pointerup', () => {
  if (curStroke && curStroke.length) strokes.push(curStroke);
  curStroke = null;
  isDrawing = false;
  redrawStrokes();
});

document.getElementById('btn-undo').onclick  = () => { strokes.pop(); redrawStrokes(); };
document.getElementById('btn-clear').onclick = () => { strokes = []; clearDraw(); };
document.getElementById('btn-done').onclick  = () => {
  if (pending) {
    const off = document.createElement('canvas');
    off.width  = dc.width;
    off.height = dc.height;
    off.getContext('2d').drawImage(dc, 0, 0);
    drawings[pending] = off;
  }
  overlay.classList.remove('active');
  pending = null;
};

function openDraw(name) {
  pending  = name;
  strokes  = [];
  clearDraw();
  document.getElementById('draw-name').textContent = name;
  overlay.classList.add('active');
}

// ── INPUT ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup',   e => { keys[e.key] = false; });

let lastMove = 0;
function handleInput(ts) {
  if (overlay.classList.contains('active')) return;
  if (ts - lastMove < 140) return;

  let nx = player.x, ny = player.y;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) ny--;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) ny++;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) nx--;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) nx++;
  if (nx === player.x && ny === player.y) return;

  nx = Math.max(0, Math.min(COLS - 1, nx));
  ny = Math.max(0, Math.min(ROWS - 1, ny));
  player.x = nx;
  player.y = ny;
  lastMove  = ts;

  const cell = world[ny][nx];
  if (cell.thing && !cell.discovered) {
    cell.discovered = true;
    if (!drawings[cell.thing]) openDraw(cell.thing);
  }
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const W = gc.width;
  const H = gc.height;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Camera offset: player tile centred on screen
  const offX = W / 2 - player.x * TILE - TILE / 2;
  const offY = H / 2 - player.y * TILE - TILE / 2;

  ctx.save();
  ctx.translate(offX, offY);

  // Faint grid
  ctx.strokeStyle = '#0c0c0c';
  ctx.lineWidth   = 1;
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(c * TILE, 0);
    ctx.lineTo(c * TILE, ROWS * TILE);
    ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(0, r * TILE);
    ctx.lineTo(COLS * TILE, r * TILE);
    ctx.stroke();
  }

  // Entities
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = world[r][c];
      if (!cell.thing) continue;

      const sx = c * TILE;
      const sy = r * TILE;
      const cx = sx + TILE / 2;
      const cy = sy + TILE / 2;

      if (!cell.discovered) {
        ctx.font         = `${Math.floor(TILE * 0.32)}px Courier New`;
        ctx.fillStyle    = '#1c1c1c';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('?', cx, cy);
      } else if (drawings[cell.thing]) {
        const pad = 5;
        ctx.save();
        ctx.globalAlpha = 0.92;
        ctx.drawImage(drawings[cell.thing], sx + pad, sy + pad, TILE - pad * 2, TILE - pad * 2);
        ctx.restore();
      } else {
        ctx.font         = `${Math.floor(TILE * 0.16)}px Courier New`;
        ctx.fillStyle    = '#282828';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(cell.thing, cx, cy);
      }
    }
  }

  // Player marker — crosshair circle
  const px = player.x * TILE + TILE / 2;
  const py = player.y * TILE + TILE / 2;
  const pr = 10;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth   = 2;
  ctx.beginPath();
  ctx.arc(px, py, pr, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(px - pr * 1.8, py); ctx.lineTo(px + pr * 1.8, py);
  ctx.moveTo(px, py - pr * 1.8); ctx.lineTo(px, py + pr * 1.8);
  ctx.stroke();

  ctx.restore();
}

// ── LOOP ─────────────────────────────────────────────────────────────────────
function loop(ts) {
  handleInput(ts);
  render();
  requestAnimationFrame(loop);
}

clearDraw();
requestAnimationFrame(loop);
</script>
</body>
</html>
